{% load static i18n %}
<div class="page-title dark-background page-title--banner"
     data-aos="fade"
     style="background-image: url('{% if background_image %}{{ background_image }}{% else %}{% static "assets/img/page-title-bg.webp" %}{% endif %}');">
  <div class="container position-relative">
    {% if page_heading %}
      <h1 class="visually-hidden">{{ page_heading }}</h1>
    {% endif %}
    {% if page_motto %}
      <p class="page-motto page-motto--primary">{{ page_motto }}</p>
    {% endif %}

    {% if page_subtitle %}
    <p class="page-title__subtitle">{{ page_subtitle }}</p>
    {% elif page_subtitle_blog_meta %}
    <p class="page-title__subtitle page-title__subtitle--blog-meta">
      <span>{{ blog.date|date:"d M Y" }}</span>
      <span class="page-title__subtitle-sep" aria-hidden="true">·</span>
      <span class="page-title__subtitle-views"><i class="bi bi-eye" aria-hidden="true"></i>
        <span id="blog-detail-view-count" class="blog-view-count" data-blog-id="{{ blog.id }}">{{ blog.view_count }}</span>{% trans "views" %}
      </span>
    </p>
    {% endif %}
  </div>
</div>
